name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all --no-fail-fast

      # The dhat-heap feature gates code that --all-targets does not enable, so
      # check it builds (and clippy-clean) to keep the profiling harness from
      # rotting.
      - name: Clippy with dhat-heap feature
        run: cargo clippy --features dhat-heap --example heap_profile -- -D warnings

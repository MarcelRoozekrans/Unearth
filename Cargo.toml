[package]
name = "filerecovery"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Recover deleted files from SD cards, hard drives, and disk images by signature-based file carving."
license = "MIT"
repository = "https://github.com/MarcelRoozekrans/FileRecovery"
keywords = ["recovery", "forensics", "carving", "undelete", "data-recovery"]
categories = ["command-line-utilities", "filesystem"]

[[bin]]
name = "filerecovery"
path = "src/main.rs"

[lib]
name = "filerecovery"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
indicatif = "0.17"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
